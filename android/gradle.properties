org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:+UseParallelGC

# 构建加速：并行 + 构建缓存（二次构建明显更快）
org.gradle.caching=true
org.gradle.parallel=true

# Kotlin / Android 增量编译
kotlin.incremental=true
kotlin.incremental.android=true

# 本机已通过 Homebrew 安装 OpenJDK 17，但未注册到 macOS 的 Java 列表时，终端会报
# “Unable to locate a Java Runtime”。此处固定 Gradle 使用的 JDK，避免依赖系统 java。
# 若你本机 `java -version` 已正常，可删除下一行；Intel Homebrew 一般为 /usr/local/opt/...
org.gradle.java.home=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home

android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
