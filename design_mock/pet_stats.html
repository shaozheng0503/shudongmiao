<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CatAgentApp - 宠物档案与排名</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/echarts.min.5.4.3.js"></script>
<style>
        .app-container { width: 375px; height: 812px; background: #FFF7ED; position: relative; overflow: hidden; border: 8px solid #333; border-radius: 40px; margin: 20px auto; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100">
<div class="app-container flex flex-col">
<!-- 顶部 -->
<div class="px-5 pt-12 pb-4 flex justify-between items-center">
<h2 class="text-xl font-bold text-gray-800">我的宠物档案</h2>
<button class="bg-orange-500 text-white px-3 py-1 rounded-full text-[10px] font-bold flex items-center gap-1">
<iconify-icon icon="lucide:plus" width="12"></iconify-icon> 添加
            </button>
</div>
<div class="flex-1 overflow-y-auto hide-scrollbar px-5 pb-24">
<!-- 档案切换与对比 -->
<div class="flex gap-4 overflow-x-auto hide-scrollbar py-2">
<div class="min-w-[140px] bg-white rounded-3xl p-4 border-2 border-orange-500 shadow-sm">
<div class="relative w-12 h-12 mb-3">
<img alt="Cat" class="w-full h-full rounded-2xl object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-04-18/dee456202eb0407cb2cd9b58b1cb1c21.jpg"/>
<div class="absolute -right-1 -bottom-1 bg-green-500 w-3 h-3 rounded-full border-2 border-white"></div>
</div>
<p class="text-xs font-bold text-gray-800">布丁 (美短)</p>
<p class="text-[10px] text-gray-400">活跃度：中等</p>
<div class="mt-2 flex items-center gap-1">
<span class="text-[10px] font-bold text-orange-500">89</span>
<div class="flex-1 h-1 bg-gray-100 rounded-full">
<div class="h-full bg-orange-500 w-[89%]"></div>
</div>
</div>
</div>
<div class="min-w-[140px] bg-white rounded-3xl p-4 border-2 border-transparent shadow-sm">
<div class="relative w-12 h-12 mb-3">
<img alt="Dog" class="w-full h-full rounded-2xl object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-04-18/b24261de8d354056a714106f955dd955.jpg"/>
<div class="absolute -right-1 -bottom-1 bg-gray-300 w-3 h-3 rounded-full border-2 border-white"></div>
</div>
<p class="text-xs font-bold text-gray-800">旺财 (柯基)</p>
<p class="text-[10px] text-gray-400">活跃度：极高</p>
<div class="mt-2 flex items-center gap-1">
<span class="text-[10px] font-bold text-gray-400">72</span>
<div class="flex-1 h-1 bg-gray-100 rounded-full">
<div class="h-full bg-gray-300 w-[72%]"></div>
</div>
</div>
</div>
</div>
<!-- 性格雷达图对比 -->
<div class="bg-white rounded-3xl p-5 mt-6 shadow-sm">
<h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
<iconify-icon class="text-orange-500" icon="lucide:bar-chart-3"></iconify-icon>
                    行为习惯对比
                </h3>
<div id="radarChart" style="width: 100%; height: 220px;"></div>
</div>
<!-- 健康评分排名 -->
<div class="mt-8">
<h3 class="font-bold text-gray-800 mb-4">同品种健康评分排名</h3>
<div class="bg-white rounded-3xl overflow-hidden shadow-sm">
<div class="p-4 bg-orange-50 border-b border-orange-100 flex items-center justify-between">
<span class="text-xs font-bold text-orange-800">布丁在本地区排名</span>
<span class="text-sm font-bold text-orange-600">No. 12 / 1,420</span>
</div>
<div class="divide-y divide-gray-50">
<div class="p-4 flex items-center gap-4">
<span class="text-sm font-bold text-gray-400 w-4 italic">1</span>
<img class="w-8 h-8 rounded-full" src="/agent-py/static/source/images/placeholder.svg"/>
<span class="text-xs flex-1">雪球 (拿破仑)</span>
<span class="text-xs font-bold text-green-500">98 分</span>
</div>
<div class="p-4 flex items-center gap-4 bg-orange-50/30">
<span class="text-sm font-bold text-orange-500 w-4 italic">12</span>
<img class="w-8 h-8 rounded-full" src="/agent-py/static/source/images/placeholder.svg"/>
<span class="text-xs flex-1 font-bold">布丁 (美短) - 我</span>
<span class="text-xs font-bold text-orange-500">89 分</span>
</div>
<div class="p-4 flex items-center gap-4">
<span class="text-sm font-bold text-gray-400 w-4 italic">13</span>
<img class="w-8 h-8 rounded-full" src="/agent-py/static/source/images/placeholder.svg"/>
<span class="text-xs flex-1">米娅 (英短)</span>
<span class="text-xs font-bold text-orange-400">88 分</span>
</div>
<div class="p-4 flex items-center gap-4">
<span class="text-sm font-bold text-gray-400 w-4 italic">14</span>
<img class="w-8 h-8 rounded-full" src="/agent-py/static/source/images/placeholder.svg"/>
<span class="text-xs flex-1">Lucky (布偶)</span>
<span class="text-xs font-bold text-orange-400">87 分</span>
</div>
</div>
</div>
</div>
</div>
<!-- 底部导航 -->
<div class="absolute bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 px-6 py-3 flex justify-between items-center pb-8">
<a class="flex flex-col items-center gap-1 text-gray-400" href="index.html">
<iconify-icon icon="lucide:home" width="24"></iconify-icon>
<span class="text-[10px]">首页</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="live_monitor.html">
<iconify-icon icon="lucide:camera" width="24"></iconify-icon>
<span class="text-[10px]">观察</span>
</a>
<div class="relative -top-5">
<div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center text-white shadow-lg border-4 border-white">
<iconify-icon icon="lucide:plus" width="28"></iconify-icon>
</div>
</div>
<a class="flex flex-col items-center gap-1 text-orange-500" href="pet_stats.html">
<iconify-icon icon="lucide:activity" width="24"></iconify-icon>
<span class="text-[10px] font-bold">健康</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="#">
<iconify-icon icon="lucide:user" width="24"></iconify-icon>
<span class="text-[10px]">我的</span>
</a>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', function() {
            var chartDom = document.getElementById('radarChart');
            var myChart = echarts.init(chartDom);
            var option = {
                radar: {
                    indicator: [
                        { name: '亲和力', max: 100 },
                        { name: '活跃度', max: 100 },
                        { name: '警觉性', max: 100 },
                        { name: '食欲度', max: 100 },
                        { name: '睡眠质量', max: 100 }
                    ],
                    shape: 'circle',
                    splitNumber: 4,
                    axisName: { color: '#999', fontSize: 10 },
                    splitLine: { lineStyle: { color: '#FEE2E2' } },
                    splitArea: { show: false }
                },
                series: [{
                    type: 'radar',
                    data: [
                        {
                            value: [85, 40, 95, 90, 80],
                            name: '布丁',
                            itemStyle: { color: '#FF9F43' },
                            areaStyle: { color: 'rgba(255, 159, 67, 0.3)' }
                        },
                        {
                            value: [95, 90, 60, 85, 70],
                            name: '旺财',
                            itemStyle: { color: '#94a3b8' },
                            areaStyle: { color: 'rgba(148, 163, 184, 0.2)' }
                        }
                    ],
                    symbol: 'none'
                }]
            };
            myChart.setOption(option);
        });
    </script>
</body>
</html>
