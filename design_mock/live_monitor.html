<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CatAgentApp - 实时观察</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        .app-container { width: 375px; height: 812px; background: #000; position: relative; overflow: hidden; border: 8px solid #333; border-radius: 40px; margin: 20px auto; }
        .camera-overlay { background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.4) 100%); }
        .scanning-line { height: 2px; background: linear-gradient(90deg, transparent, #FF9F43, transparent); position: absolute; width: 100%; top: 0; animation: scan 3s linear infinite; }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        .voice-wave { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
        .bar { width: 2px; background: #FF9F43; animation: wave 1s infinite alternate; }
        @keyframes wave { from { height: 4px; } to { height: 16px; } }
    </style>
</head>
<body class="bg-gray-100">
<div class="app-container text-white">
<!-- 模拟相机画面 -->
<div class="absolute inset-0 z-0">
<img alt="Live Camera" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-04-18/827a381cc0214f2b87921af7b9d730d4.jpg"/>
<div class="absolute inset-0 camera-overlay"></div>
<div class="scanning-line"></div>
</div>
<!-- 顶部控制 -->
<div class="relative z-10 px-6 pt-12 flex justify-between items-start">
<a class="w-10 h-10 bg-black/40 backdrop-blur-md rounded-full flex items-center justify-center" href="index.html">
<iconify-icon icon="lucide:chevron-left" width="24"></iconify-icon>
</a>
<div class="bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full flex items-center gap-2">
<div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
<span class="text-xs font-bold tracking-wider">LIVE · 1080P</span>
</div>
<button class="w-10 h-10 bg-black/40 backdrop-blur-md rounded-full flex items-center justify-center">
<iconify-icon icon="lucide:more-horizontal" width="24"></iconify-icon>
</button>
</div>
<!-- 实时分析标签 -->
<div class="absolute top-32 left-6 right-6 z-10">
<div class="flex flex-wrap gap-2">
<div class="bg-orange-500/80 backdrop-blur-sm px-3 py-1 rounded-lg flex items-center gap-1">
<iconify-icon icon="mdi:cat" width="16"></iconify-icon>
<span class="text-[10px] font-bold">目标：狸花猫</span>
</div>
<div class="bg-white/20 backdrop-blur-sm px-3 py-1 rounded-lg flex items-center gap-1 border border-white/30">
<span class="text-[10px]">状态：[ 正在理毛 ]</span>
</div>
<div class="bg-white/20 backdrop-blur-sm px-3 py-1 rounded-lg flex items-center gap-1 border border-white/30">
<span class="text-[10px]">置信度：98.2%</span>
</div>
</div>
</div>
<!-- 底部交互区域 -->
<div class="absolute bottom-10 left-4 right-4 z-20 space-y-4">
<!-- 周期分析卡片 -->
<div class="bg-white/10 backdrop-blur-xl rounded-2xl p-4 border border-white/20 shadow-2xl">
<div class="flex items-start gap-4">
<div class="w-12 h-12 bg-orange-500 rounded-xl flex items-center justify-center flex-shrink-0">
<iconify-icon icon="lucide:brain-circuit" width="28"></iconify-icon>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<span class="text-xs font-bold text-orange-400">AI 行为实时解析</span>
<div class="voice-wave">
<div class="bar" style="animation-delay: 0.1s"></div>
<div class="bar" style="animation-delay: 0.3s"></div>
<div class="bar" style="animation-delay: 0.2s"></div>
<div class="bar" style="animation-delay: 0.4s"></div>
</div>
</div>
<p class="text-sm font-medium leading-relaxed">布丁当前处于高度放松状态，正在进行自我清洁。这表明其周围环境安全，压力值极低。</p>
</div>
</div>
<div class="mt-4 pt-4 border-t border-white/10 flex justify-between items-center">
<div class="flex gap-2">
<button class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg flex items-center gap-1 text-[10px] transition-all">
<iconify-icon icon="lucide:mic" width="14"></iconify-icon> 语音指令
                        </button>
<button class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg flex items-center gap-1 text-[10px] transition-all">
<iconify-icon icon="lucide:volume-2" width="14"></iconify-icon> TTS 播报
                        </button>
</div>
<button class="text-orange-400 text-[10px] font-bold">详细分析报告 &gt;</button>
</div>
</div>
<!-- 控制按钮 -->
<div class="flex justify-around items-center px-4 py-2">
<div class="flex flex-col items-center gap-1">
<div class="w-12 h-12 rounded-full border border-white/30 flex items-center justify-center">
<iconify-icon icon="lucide:camera" width="20"></iconify-icon>
</div>
<span class="text-[10px]">抓拍</span>
</div>
<div class="w-16 h-16 rounded-full border-4 border-orange-500 flex items-center justify-center bg-white/10">
<div class="w-12 h-12 bg-red-600 rounded-full animate-pulse"></div>
</div>
<div class="flex flex-col items-center gap-1">
<div class="w-12 h-12 rounded-full border border-white/30 flex items-center justify-center">
<iconify-icon icon="lucide:share-2" width="20"></iconify-icon>
</div>
<span class="text-[10px]">分享</span>
</div>
</div>
</div>
</div>
</body>
</html>
