<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>树洞喵 - 健康报告</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { width: 375px; height: 812px; background: #FFFDF0; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; overflow: hidden; border: 8px solid #FFFFFF; }
        .alert-card { background: linear-gradient(135deg, #FF9B9B 0%, #FF6B6B 100%); }
    </style>
</head>
<body>
<div class="app-container flex flex-col">
<header class="px-6 pt-12 pb-4 flex items-center gap-4">
<a class="text-amber-900" href="index.html"><iconify-icon icon="ph:arrow-left-bold" width="24"></iconify-icon></a>
<h1 class="text-xl font-bold text-amber-900">本喵的健康报告</h1>
</header>
<main class="flex-1 overflow-y-auto px-6 pb-24">
<!-- 整体评分 -->
<div class="flex flex-col items-center my-6">
<div class="relative w-32 h-32 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-amber-100" cx="64" cy="64" fill="transparent" r="56" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-lime-500" cx="64" cy="64" fill="transparent" r="56" stroke="currentColor" stroke-dasharray="351.8" stroke-dashoffset="70.36" stroke-width="8"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="text-3xl font-extrabold text-amber-900">80</span>
<span class="text-[10px] text-amber-700/50 uppercase tracking-tighter">身体分数</span>
</div>
</div>
<p class="mt-4 text-sm font-bold text-amber-800">本喵整体状态还算不错喵！</p>
</div>
<!-- 紧急警示 -->
<section class="alert-card rounded-3xl p-5 mb-6 text-white shadow-lg relative overflow-hidden">
<div class="absolute -right-4 -top-4 opacity-20">
<iconify-icon icon="ph:warning-circle-fill" width="100"></iconify-icon>
</div>
<div class="flex items-center gap-2 mb-2">
<iconify-icon icon="ph:warning-fill"></iconify-icon>
<h2 class="font-bold">异常行为提醒</h2>
</div>
<p class="text-xs leading-relaxed mb-4">本喵今天早上 08:30 到 10:00 期间一直躲在床底不肯出来，且拒绝了平时最爱的小鱼干。这不符合本喵爱热闹的性格喵！</p>
<div class="flex gap-2">
<button class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full text-[10px] font-bold backdrop-blur-md">咨询宠医</button>
<button class="bg-white text-red-500 px-3 py-1.5 rounded-full text-[10px] font-bold">查看对策</button>
</div>
</section>
<!-- 健康指标详情 -->
<h2 class="text-sm font-bold text-amber-900 mb-4">指标分析 (基于 2026-04-18)</h2>
<div class="space-y-4">
<div class="bg-white rounded-2xl p-4 shadow-sm flex items-center gap-4">
<div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-blue-500">
<iconify-icon icon="ph:drop-fill" width="24"></iconify-icon>
</div>
<div class="flex-1">
<div class="flex justify-between items-end mb-1">
<span class="text-xs font-bold text-amber-900">饮水频次</span>
<span class="text-[10px] text-red-500 font-bold">偏少</span>
</div>
<div class="w-full h-1.5 bg-gray-100 rounded-full">
<div class="w-1/3 h-full bg-red-400 rounded-full"></div>
</div>
</div>
</div>
<div class="bg-white rounded-2xl p-4 shadow-sm flex items-center gap-4">
<div class="w-12 h-12 bg-lime-50 rounded-full flex items-center justify-center text-lime-500">
<iconify-icon icon="ph:moped-fill" width="24"></iconify-icon>
</div>
<div class="flex-1">
<div class="flex justify-between items-end mb-1">
<span class="text-xs font-bold text-amber-900">运动消耗</span>
<span class="text-[10px] text-lime-600 font-bold">标准</span>
</div>
<div class="w-full h-1.5 bg-gray-100 rounded-full">
<div class="w-4/5 h-full bg-lime-500 rounded-full"></div>
</div>
</div>
</div>
<div class="bg-white rounded-2xl p-4 shadow-sm flex items-center gap-4">
<div class="w-12 h-12 bg-amber-50 rounded-full flex items-center justify-center text-amber-500">
<iconify-icon icon="ph:moon-stars-fill" width="24"></iconify-icon>
</div>
<div class="flex-1">
<div class="flex justify-between items-end mb-1">
<span class="text-xs font-bold text-amber-900">睡眠质量</span>
<span class="text-[10px] text-amber-600 font-bold">极佳</span>
</div>
<div class="w-full h-1.5 bg-gray-100 rounded-full">
<div class="w-[95%] h-full bg-amber-400 rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- 温馨小贴士 -->
<div class="mt-8 p-4 border-2 border-dashed border-lime-200 rounded-3xl flex items-start gap-3">
<span class="text-2xl">💡</span>
<div>
<p class="text-xs font-bold text-lime-700 mb-1">本喵的小建议</p>
<p class="text-[10px] text-amber-800/70 leading-relaxed">主人，本喵最近可能有点上火喵。多给本喵准备点干净的流动水，或者拌点主食罐头。本喵爱你喵~</p>
</div>
</div>
</main>
<nav class="absolute bottom-0 w-full bg-white h-20 border-t border-amber-100 px-6 flex items-center justify-between rounded-t-[32px]">
<a class="flex flex-col items-center gap-1 text-amber-900/40" href="index.html">
<iconify-icon icon="ph:house" width="26"></iconify-icon>
<span class="text-[10px]">主页</span>
</a>
<a class="flex flex-col items-center gap-1 text-amber-900/40" href="monitor.html">
<iconify-icon icon="ph:video-camera" width="26"></iconify-icon>
<span class="text-[10px]">监控</span>
</a>
<div class="w-14 h-14 bg-lime-500 rounded-full -mt-10 border-4 border-white flex items-center justify-center text-white">
<iconify-icon icon="ph:scan-fill" width="28"></iconify-icon>
</div>
<a class="flex flex-col items-center gap-1 text-amber-900/40" href="history.html">
<iconify-icon icon="ph:clock-counter-clockwise" width="26"></iconify-icon>
<span class="text-[10px]">历史</span>
</a>
<a class="flex flex-col items-center gap-1 text-lime-600" href="#">
<iconify-icon icon="ph:heart-fill" width="26"></iconify-icon>
<span class="text-[10px] font-bold">健康</span>
</a>
</nav>
</div>
</body>
</html>
